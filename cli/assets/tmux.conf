# Optimized tmux configuration for cs (claude-sessions)
#
# WHY: cs runs each Claude Code session in its own tmux window. With this
# config you get ergonomic splits, mouse support, vim-style pane navigation,
# Claude-specific popup shortcuts, and session persistence across reboots.
#
# INSTALL:
#   cp dotfiles/tmux.conf ~/.tmux.conf
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   # inside tmux: press C-a I to install plugins

# ── Prefix ─────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 0          # critical for nvim/vim
set -g extended-keys on        # pass Shift+Enter through to Claude Code

# ── Mouse: click panes, click windows in status bar, scroll, drag-resize ───
set -g mouse on

# Right-click pane: context menu
bind -n MouseDown3Pane if-shell "[ '#{mouse_status_range}' = '' ]" \
    'display-menu -T "#[align=centre]#{pane_index} (#{pane_id})" \
        "Zoom pane"     z "resize-pane -Z" \
        "Split right"   h "split-window -h -c \"#{pane_current_path}\"" \
        "Split down"    v "split-window -v -c \"#{pane_current_path}\"" \
        "Kill pane"     x "kill-pane"'

# Double-click to select word
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word
bind -n DoubleClick1Pane select-pane \; copy-mode \; send -X select-word

# Wheel scroll speed
bind -T copy-mode-vi WheelUpPane   select-pane \; send -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send -X -N 3 scroll-down

# ── Indexing ───────────────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ── Splits (open in same directory) ────────────────────────────────────────
unbind '"'
unbind '%'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation: vim-style ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ──────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation ──────────────────────────────────────────────────────
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# ── Reload config ──────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Copy mode (vi keys) ────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line

# macOS clipboard
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
}

# ── Pane borders ───────────────────────────────────────────────────────────
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# ── Status bar ─────────────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 50
set -g status-right-length 60

set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7]"
set -g status-right "#[fg=#565f89]%a %d %b #[fg=#a9b1d6] #[fg=#7aa2f7,bold]%H:%M #[bg=#7aa2f7,fg=#1a1b26,bold] #h "

set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[bg=#3b4261,fg=#7aa2f7,bold] #I:#W#{?window_zoomed_flag, [],} "
set -g window-status-separator ""

# ── Activity / bell alerts ─────────────────────────────────────────────────
# Tab flashes amber when another session has activity, red when Claude rings bell
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#e0af68,bold"
set -g visual-bell on
set -g bell-action other
set -g window-status-bell-style "fg=#f7768e,bold,blink"

# ── Session management ─────────────────────────────────────────────────────
bind S choose-session
bind N command-prompt -p "New session:" "new-session -s '%%'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# ── Popup scratchpad ───────────────────────────────────────────────────────
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"

# ─────────────────────────────────────────────────────────────────────────
# ── CLAUDE CODE ──────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────

# C-a a → Claude in popup (closes when done, great for quick questions)
bind a display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "claude"

# C-a A → Claude in new window (persistent, for deeper tasks)
bind A new-window -n "claude" -c "#{pane_current_path}" "claude"

# C-a W → side-by-side: editor left, Claude right (38%)
bind W split-window -h -p 38 -c "#{pane_current_path}" "claude"

# C-a B → Claude top, shell scratchpad below (good for running commands Claude suggests)
bind B split-window -v -p 30 -c "#{pane_current_path}" \; \
        select-pane -t 1 \; \
        send-keys "claude" Enter

# ── Quick layouts ──────────────────────────────────────────────────────────
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout tiled
bind z resize-pane -Z

# ─────────────────────────────────────────────────────────────────────────
# ── TPM PLUGINS ──────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence: sessions survive terminal crashes and reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'

# --- cs begin ---
# Managed by cs setup. Remove via: cs setup → notifications → remove.

# Allow OSC escape sequences to pass through to the host terminal (e.g. Ghostty).
set -g allow-passthrough on

# Stall detection: invoke the cs notify script when a window goes silent.
# The notify script reads TMUX_SESSION and TMUX_WINDOW from the run-shell env.
set-hook -g alert-silence 'run-shell -b "~/.local/share/cs/notify.sh stall"'
# --- cs end ---
